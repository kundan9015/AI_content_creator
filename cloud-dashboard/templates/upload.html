<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload Video - AI Content Creator</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 800px; margin: 0 auto; }
        .header {
            background: white;
            padding: 20px 30px;
            border-radius: 10px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .header h1 { color: #667eea; font-size: 28px; margin-bottom: 5px; }
        .nav {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }
        .nav a {
            padding: 10px 20px;
            background: #667eea;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            font-size: 14px;
        }
        .nav a.active { background: #764ba2; }
        .card {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .upload-zone {
            border: 3px dashed #667eea;
            border-radius: 10px;
            padding: 60px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 20px;
        }
        .upload-zone:hover {
            background: #f8f9fa;
            border-color: #764ba2;
        }
        .upload-zone.dragover {
            background: #e7f1ff;
            border-color: #667eea;
        }
        .upload-icon {
            font-size: 60px;
            margin-bottom: 15px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #333;
        }
        .form-group select,
        .form-group input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
        }
        .upload-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .upload-btn:hover {
            transform: translateY(-2px);
        }
        .upload-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .progress-container {
            display: none;
            margin-top: 20px;
        }
        .progress-bar {
            width: 100%;
            height: 30px;
            background: #f0f0f0;
            border-radius: 15px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            transition: width 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
        }
        .status-message {
            margin-top: 15px;
            padding: 12px;
            border-radius: 8px;
            text-align: center;
            font-weight: bold;
            display: none;
        }
        .status-success {
            background: #d4edda;
            color: #155724;
        }
        .status-error {
            background: #f8d7da;
            color: #721c24;
        }
        .file-info {
            margin-top: 15px;
            padding: 12px;
            background: #f8f9fa;
            border-radius: 8px;
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎬 AI Content Creator</h1>
            <div class="nav">
                <a href="/">Dashboard</a>
                <a href="/upload" class="active">Upload Video</a>
                <a href="/settings">Settings</a>
                <a href="/history">History</a>
            </div>
        </div>

        <div class="card">
            <h2 style="margin-bottom: 25px; color: #333;">📤 Upload New Video</h2>

            <form id="uploadForm">
                <div class="form-group">
                    <label for="pc_select">Select PC:</label>
                    <select id="pc_select" name="pc_id" required>
                        <option value="">-- Choose PC --</option>
                        {% for agent in agents %}
                        <option value="{{ agent.pc_id }}">
                            {{ agent.pc_name or agent.pc_id }} ({{ agent.status }})
                        </option>
                        {% endfor %}
                    </select>
                </div>

                <div class="upload-zone" id="uploadZone">
                    <div class="upload-icon">📁</div>
                    <h3>Drag & Drop Video Here</h3>
                    <p>or click to browse</p>
                    <input type="file" id="videoFile" name="video" accept="video/*" style="display: none;" required>
                </div>

                <div class="file-info" id="fileInfo">
                    <strong>Selected:</strong> <span id="fileName"></span><br>
                    <strong>Size:</strong> <span id="fileSize"></span>
                </div>

                <div class="form-group">
                    <label for="clip_duration">Clip Duration (minutes):</label>
                    <select id="clip_duration" name="clip_duration">
                        <option value="5">5 minutes</option>
                        <option value="10" selected>10 minutes</option>
                        <option value="15">15 minutes</option>
                        <option value="20">20 minutes</option>
                    </select>
                </div>

                <button type="submit" class="upload-btn" id="uploadBtn">
                    🚀 Upload & Start Processing
                </button>

                <div class="progress-container" id="progressContainer">
                    <div class="progress-bar">
                        <div class="progress-fill" id="progressFill">0%</div>
                    </div>
                    <p style="text-align: center; margin-top: 10px; color: #666;">
                        <span id="progressStatus">Uploading...</span>
                    </p>
                </div>

                <div class="status-message" id="statusMessage"></div>
            </form>
        </div>
    </div>

    <script>
        const uploadZone = document.getElementById('uploadZone');
        const videoFile = document.getElementById('videoFile');
        const fileName = document.getElementById('fileName');
        const fileSize = document.getElementById('fileSize');
        const fileInfo = document.getElementById('fileInfo');
        const uploadForm = document.getElementById('uploadForm');
        const uploadBtn = document.getElementById('uploadBtn');
        const progressContainer = document.getElementById('progressContainer');
        const progressFill = document.getElementById('progressFill');
        const progressStatus = document.getElementById('progressStatus');
        const statusMessage = document.getElementById('statusMessage');

        // Click to upload
        uploadZone.addEventListener('click', () => videoFile.click());

        // Drag and drop
        uploadZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadZone.classList.add('dragover');
        });

        uploadZone.addEventListener('dragleave', () => {
            uploadZone.classList.remove('dragover');
        });

        uploadZone.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadZone.classList.remove('dragover');
            const files = e.dataTransfer.files;
            if (files.length > 0) {
                videoFile.files = files;
                displayFileInfo(files[0]);
            }
        });

        // File selected
        videoFile.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                displayFileInfo(e.target.files[0]);
            }
        });

        function displayFileInfo(file) {
            fileName.textContent = file.name;
            fileSize.textContent = formatFileSize(file.size);
            fileInfo.style.display = 'block';
        }

        function formatFileSize(bytes) {
            if (bytes === 0) return '0 Bytes';
            const k = 1024;
            const sizes = ['Bytes', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return Math.round(bytes / Math.pow(k, i) * 100) / 100 + ' ' + sizes[i];
        }

        // Form submission
        uploadForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            const formData = new FormData(uploadForm);

            // Show progress
            uploadBtn.disabled = true;
            progressContainer.style.display = 'block';
            statusMessage.style.display = 'none';

            try {
                const xhr = new XMLHttpRequest();

                // Upload progress
                xhr.upload.addEventListener('progress', (e) => {
                    if (e.lengthComputable) {
                        const percent = Math.round((e.loaded / e.total) * 100);
                        progressFill.style.width = percent + '%';
                        progressFill.textContent = percent + '%';
                        progressStatus.textContent = `Uploading... ${percent}%`;
                    }
                });

                xhr.addEventListener('load', () => {
                    if (xhr.status === 200) {
                        const response = JSON.parse(xhr.responseText);
                        showStatus('success', '✅ Upload successful! Your PC will download and process it.');
                        uploadForm.reset();
                        fileInfo.style.display = 'none';

                        // Redirect to dashboard after 3 seconds
                        setTimeout(() => {
                            window.location.href = '/';
                        }, 3000);
                    } else {
                        showStatus('error', '❌ Upload failed: ' + xhr.responseText);
                    }
                    uploadBtn.disabled = false;
                });

                xhr.addEventListener('error', () => {
                    showStatus('error', '❌ Network error. Please try again.');
                    uploadBtn.disabled = false;
                });

                xhr.open('POST', '/api/upload-video');
                xhr.send(formData);

            } catch (error) {
                showStatus('error', '❌ Error: ' + error.message);
                uploadBtn.disabled = false;
            }
        });

        function showStatus(type, message) {
            statusMessage.className = 'status-message status-' + type;
            statusMessage.textContent = message;
            statusMessage.style.display = 'block';
            progressContainer.style.display = 'none';
        }
    </script>
</body>
</html>
