services:
  - type: web
    name: ai-content-creator
    env: python
    region: oregon
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: SECRET_KEY
        generateValue: true
    disk:
      name: ai-creator-disk
      mountPath: /opt/render/project/src
      sizeGB: 1
